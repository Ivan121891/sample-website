<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Tua Pelle Sacramento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .checkout-main {
            padding: 8rem 0 6rem;
            background-color: var(--bg-color);
            min-height: 100vh;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4rem;
        }

        @media(min-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1.5fr 1fr;
            }
        }

        .checkout-panel {
            background: #fff;
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .checkout-title {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(44, 62, 46, 0.1);
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        .form-section-title {
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media(min-width: 600px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .form-group input,
        .form-group select {
            padding: 0.8rem;
            border: 1px solid rgba(44, 62, 46, 0.2);
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary-color);
        }

        /* Order Summary Styles */
        .order-summary-item {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .order-summary-img {
            width: 65px;
            height: 65px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            background-color: var(--bg-color);
            position: relative;
        }

        .order-summary-qty {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: var(--text-light);
            color: #fff;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .order-summary-details {
            flex-grow: 1;
        }

        .order-summary-title {
            font-size: 0.95rem;
            margin: 0;
        }

        .order-summary-price {
            font-family: var(--font-heading);
            color: var(--text-light);
        }

        .summary-totals {
            margin-top: 2rem;
            border-top: 1px solid rgba(44, 62, 46, 0.1);
            padding-top: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .summary-row.total {
            color: var(--text-color);
            font-size: 1.3rem;
            font-weight: 500;
            font-family: var(--font-heading);
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(44, 62, 46, 0.1);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">TUA PELLE</a>
            <nav class="nav">
                <div class="nav-item">
                    <a href="shop.html" class="nav-link">Shop</a>
                </div>
                <div class="nav-item">
                    <a href="index.html#treatments" class="nav-link">Treatments</a>
                    <div class="dropdown-menu">
                        <a href="facial-treatment.html" class="dropdown-link">Facial Rituals</a>
                        <a href="body-treatment.html" class="dropdown-link">Body Rituals</a>
                    </div>
                </div>
                <div class="nav-item">
                    <a href="about.html" class="nav-link">About</a>
                </div>
                <div class="nav-item">
                    <a href="contact.html" class="nav-link">Contact Us</a>
                </div>
            </nav>
            <div class="header-actions">
                <a href="shop.html" style="font-size: 0.95rem; color: var(--text-color);text-decoration: none;">Return
                    to Shop</a>
            </div>
        </div>
    </header>

    <main class="checkout-main">
        <div class="container checkout-grid">

            <!-- Left Panel: Forms -->
            <div class="checkout-panel">
                <h2 class="section-title checkout-title">Secure Checkout</h2>

                <form id="checkoutForm">
                    <div class="form-section">
                        <h3 class="form-section-title">Contact Information</h3>
                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input type="email" id="email" required>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title">Shipping Address</h3>
                        <div class="form-row">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="firstName">First name</label>
                                <input type="text" id="firstName" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="lastName">Last name</label>
                                <input type="text" id="lastName" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" required>
                        </div>
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="state">State / Province</label>
                                <input type="text" id="state" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="zip">ZIP / Postal code</label>
                                <input type="text" id="zip" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title">Payment</h3>
                        <div class="form-group">
                            <label for="card">Card number</label>
                            <input type="text" id="card" placeholder="**** **** **** ****" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="exp">Expiration date (MM/YY)</label>
                                <input type="text" id="exp" placeholder="MM/YY" required>
                            </div>
                            <div class="form-group" style="margin-bottom: 0;">
                                <label for="cvc">Security code</label>
                                <input type="text" id="cvc" placeholder="CVC" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; font-size: 1.1rem; padding: 1.2rem;">Complete Order</button>
                </form>
            </div>

            <!-- Right Panel: Order Summary -->
            <div class="checkout-panel"
                style="background-color: transparent; box-shadow: none; border: 1px solid rgba(44, 62, 46, 0.1);">
                <h3 class="form-section-title">Order Summary</h3>

                <div id="checkoutItemsList">
                    <!-- Items will be injected here via JS -->
                </div>

                <div class="summary-totals">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkoutSubtotal">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span>$8.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Taxes</span>
                        <span id="checkoutTaxes">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="checkoutTotal">$0.00</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer intentionally omitted to keep checkout clean and frictionless -->

    <script src="js/main.js"></script>
</body>

</html>
